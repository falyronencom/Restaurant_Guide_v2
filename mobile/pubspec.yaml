name: restaurant_guide_mobile
version: 1.0.0+1
description: Мобильное приложение Restaurant Guide Belarus v2.0
publish_to: "none"

environment:
  sdk: ">=3.0.0 <4.0.0"
  flutter: ">=3.13.0"

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  provider: ^6.0.5
  dio: ^5.4.3
  yandex_mapkit: ^4.0.0
  geolocator: ^10.1.0
  cached_network_image: ^3.3.1
  shared_preferences: ^2.2.2
  flutter_secure_storage: ^9.0.0
  google_sign_in: ^6.2.1
  flutter_web_auth_2: ^4.0.1
  intl: ^0.20.2
  image_picker: ^1.0.7
  http: ^1.2.0
  google_fonts: ^6.1.0
  flutter_svg: ^2.0.10
  url_launcher: ^6.2.5
  share_plus: ^10.1.4
  fl_chart: ^0.69.2
  firebase_core: ^3.13.0
  firebase_messaging: ^15.2.3
  file_picker: ^8.1.7
  pdfx: ^2.7.0
  path_provider: ^2.1.4

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.1

flutter:
  uses-material-design: true

  assets:
    - assets/images/
    - assets/icons/
