name: restaurant_guide_mobile
version: 1.0.0+1
description: Мобильное приложение Restaurant Guide Belarus v2.0
publish_to: "none"

environment:
  sdk: ">=3.0.0 <4.0.0"
  flutter: ">=3.13.0"

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  provider: ^6.0.5
  dio: ^5.4.3
  yandex_mapkit: ^4.0.0
  geolocator: ^10.1.0
  cached_network_image: ^3.3.1
  shared_preferences: ^2.2.2
  flutter_secure_storage: ^9.0.0
  google_sign_in: ^6.2.1
  flutter_web_auth_2: ^4.0.1
  intl: ^0.20.2
  image_picker: ^1.0.7
  http: ^1.2.0
  google_fonts: ^6.1.0
  flutter_svg: ^2.0.10
  url_launcher: ^6.2.5
  share_plus: ^10.1.4
  fl_chart: ^0.69.2
  firebase_core: ^3.13.0
  firebase_messaging: ^15.2.3
  file_picker: ^8.1.7
  pdfx: ^2.7.0
  path_provider: ^2.1.4

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.1
  flutter_launcher_icons: ^0.14.4

# App launcher icon — NIRIVIO «cockade» (source assets in mobile/icon/, exported
# from the Claude Design handoff). Regenerate with:
#   dart run flutter_launcher_icons
flutter_launcher_icons:
  android: true
  ios: true
  image_path_android: "icon/android-legacy-ic_launcher-512.png"
  adaptive_icon_background: "icon/android-adaptive-background-1024.png"
  adaptive_icon_foreground: "icon/android-adaptive-foreground-1024.png"
  # Foreground asset is already fitted to the 66dp safe-zone (×0.79) by the
  # design export, so suppress the generator's default 16% inset (would
  # double-shrink the mark).
  adaptive_icon_foreground_inset: 0
  image_path_ios: "icon/ios-appicon-1024.png"
  remove_alpha_ios: true

flutter:
  uses-material-design: true

  assets:
    - assets/images/
    - assets/icons/
